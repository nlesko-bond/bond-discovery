<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Bond Sports">
  <!-- Bondy the hedgehog holding a basketball — simplified brand mark for small sizes.
       Swap this file for official artwork any time; the admin sidebar references it by path. -->
  <!-- Spiky mane -->
  <path d="M50.0,3.0 L56.6,8.5 L64.5,5.3 L69.1,12.6 L77.6,12.0 L79.7,20.3 L88.0,22.4 L87.4,30.9 L94.7,35.5 L91.5,43.4 L97.0,50.0 L91.5,56.6 L94.7,64.5 L87.4,69.1 L88.0,77.6 L79.7,79.7 L77.6,88.0 L69.1,87.4 L64.5,94.7 L56.6,91.5 L50.0,97.0 L43.4,91.5 L35.5,94.7 L30.9,87.4 L22.4,88.0 L20.3,79.7 L12.0,77.6 L12.6,69.1 L5.3,64.5 L8.5,56.6 L3.0,50.0 L8.5,43.4 L5.3,35.5 L12.6,30.9 L12.0,22.4 L20.3,20.3 L22.4,12.0 L30.9,12.6 L35.5,5.3 L43.4,8.5 Z"
        fill="#1d5178" stroke="#123a58" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Quill flecks -->
  <g stroke="#e8f1f7" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M22,38 l4,-3"/><path d="M18,55 l4,2"/><path d="M25,72 l3,3"/>
    <path d="M78,38 l-4,-3"/><path d="M82,55 l-4,2"/><path d="M75,72 l-3,3"/>
    <path d="M38,16 l3,3"/><path d="M62,16 l-3,3"/>
  </g>
  <!-- Ears -->
  <circle cx="32" cy="26" r="7.5" fill="#f2a93b" stroke="#123a58" stroke-width="2"/>
  <circle cx="68" cy="26" r="7.5" fill="#f2a93b" stroke="#123a58" stroke-width="2"/>
  <circle cx="32" cy="26" r="3" fill="#123a58"/>
  <circle cx="68" cy="26" r="3" fill="#123a58"/>
  <!-- Face / body -->
  <rect x="23" y="20" width="54" height="66" rx="25" fill="#f2a93b" stroke="#123a58" stroke-width="2.5"/>
  <!-- Eyes + nose -->
  <ellipse cx="40" cy="40" rx="3.2" ry="4.6" fill="#123a58"/>
  <ellipse cx="60" cy="40" rx="3.2" ry="4.6" fill="#123a58"/>
  <ellipse cx="50" cy="51" rx="4" ry="3" fill="#123a58"/>
  <!-- Basketball -->
  <g>
    <circle cx="50" cy="70" r="14.5" fill="#f26a1b" stroke="#123a58" stroke-width="2.5"/>
    <clipPath id="ball"><circle cx="50" cy="70" r="14.5"/></clipPath>
    <g clip-path="url(#ball)" stroke="#123a58" stroke-width="1.6" fill="none">
      <path d="M50,55 v30"/>
      <path d="M35,70 h30"/>
      <path d="M38,58 q7,12 0,24"/>
      <path d="M62,58 q-7,12 0,24"/>
    </g>
  </g>
  <!-- Paws on the ball -->
  <path d="M33,66 q7,1 9,5" stroke="#123a58" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M67,66 q-7,1 -9,5" stroke="#123a58" stroke-width="2.5" fill="none" stroke-linecap="round"/>
